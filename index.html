<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث الأصناف - دبوس البسطة</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            padding: 10px; 
            line-height: 1.6; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            padding: 15px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        #logo { 
            height: 50px; 
            width: auto; 
        }
        #search { 
            width: 70%; 
            padding: 12px 20px; 
            border: 2px solid #e0e0e0; 
            border-radius: 25px; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease; 
        }
        #search:focus { 
            border-color: #4CAF50; 
            box-shadow: 0 0 10px rgba(76,175,80,0.3); 
        }
        #status { 
            text-align: center; 
            margin: 10px 0; 
            font-weight: bold; 
            color: #666; 
        }
        table { 
            width: 100%; 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
            border-collapse: collapse; 
        }
        th, td { 
            padding: 15px 12px; 
            text-align: right; 
            font-size: 15px; 
        }
        th { 
            background: linear-gradient(135deg, #4CAF50, #45a049); 
            color: white; 
            font-weight: bold; 
        }
        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #e8f5e8; transform: scale(1.01); transition: 0.2s; }
        @media (max-width: 768px) { 
            .header { flex-direction: column; gap: 15px; }
            #search { width: 100%; }
            table { font-size: 14px; }
            th, td { padding: 12px 8px; }
        }
        .no-results { 
            text-align: center; 
            padding: 40px; 
            color: #999; 
            font-size: 18px; 
        }
    </style>
</head>
<body>
    <div class="header">
        <img id="logo" src="LOGO.PNG" alt="دبوس البسطة" onerror="this.style.display='none';">
        <input type="text" id="search" placeholder="اكتب جزء من اسم الصنف للبحث... (أي ترتيب)" oninput="filterItems()">
    </div>
    <div id="status">جاري تحميل البيانات...</div>
    <table id="table">
        <thead>
            <tr>
                <th>اسم الصنف</th>
                <th>سعر المبيع</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        let items = [];

        async function loadItems() {
            try {
                const response = await fetch('ITEMS.xlsx');
                if (!response.ok) throw new Error('الملف غير موجود');
                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets['ITEMS'];
                const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false, header: 1 });
                
                items = json.slice(1).map(row => ({
                    name: row[4] || '',  // عمود E (index 4)
                    price: row[6] || '0'  // عمود G (index 6)
                })).filter(item => item.name.trim());
                
                document.getElementById('status').textContent = `✅ ${items.length} صنف جاهز!`;
                renderTable(items);
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ خطأ في تحميل ITEMS.xlsx: ' + error.message;
                document.getElementById('table').style.display = 'none';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="no-results">لا توجد أصناف مطابقة</td></tr>';
                return;
            }
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.name}</td>
                    <td>${parseFloat(item.price).toLocaleString('ar-LB')} ل.ل</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterItems() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            if (!query) {
                renderTable(items);
                return;
            }
            const words = query.split(/\s+/).filter(w => w);
            const filtered = items.filter(item => 
                words.every(word => item.name.toLowerCase().includes(word))
            );
            renderTable(filtered);
        }

        window.addEventListener('load', loadItems);
    </script>
</body>
</html>
