<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار المبيعات - دبوس البسطة</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>/* نفس الـ CSS السابقة */ /* اختصرت */</style>
</head>
<body>
    <!-- نفس HTML: header, search, table -->
    <div class="header"><h1>🔍 أسعار المبيعات - LIVE</h1></div>
    <div id="status" class="status">جاري التحميل...</div>
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث... قسط تركي" />
    <div class="table-container">
        <table id="itemsTable"><thead><tr><th>اسم الصنف</th><th>سعر المبيع</th></tr></thead><tbody id="tableBody"></tbody></table>
    </div>

    <script>
        // 🔥 ضع firebaseConfig هون من Console
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
	const firebaseConfig = {
	  apiKey: "AIzaSyDdJ3nHJJb6DO4hltDcXZry4HqxXatJSts",
	  authDomain: "dabbous-basta-prices.firebaseapp.com",
	  projectId: "dabbous-basta-prices",
	  storageBucket: "dabbous-basta-prices.firebasestorage.app",
	  messagingSenderId: "312706128887",
	  appId: "1:312706128887:web:01f59204cfda9b9d50acf2",
	  measurementId: "G-89JZMC41DT"
	};
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const itemsRef = db.ref('items'); // مسار البيانات
        
        let itemsData = [];
        
        // تحميل ITEMS أول مرة
        async function initItems() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/dabbousbasta/ITEM_PRICES/main/ITEMS.xlsx');
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });
                
                const initialItems = [];
                for (let i = 1; i < jsonData.length; i++) {
                    const itemName = (jsonData[i][4] || '').toString().trim();
                    if (itemName) initialItems.push({ name: itemName, price: '' });
                }
                
                // حفظ الأساسيات في Firebase أول مرة
                itemsRef.set(initialItems);
                document.getElementById('status').textContent = `✅ ${initialItems.length} صنف LIVE!`;
                
            } catch (error) {
                console.error(error);
            }
        }
        
        // استماع التغييرات LIVE
        itemsRef.on('value', (snapshot) => {
            itemsData = snapshot.val() || [];
            renderTable(itemsData);
            document.getElementById('status').textContent = `🔴 LIVE: ${itemsData.length} صنف محدث!`;
        });
        
        // نفس renderTable + فلترة
        function renderTable(data) {
            // نفس الكود السابق للجدول + صف جديد
        }
        
        // حفظ فوري في Firebase
        function saveData() {
            // نفس السابق لاستخراج التعديلات/الإضافة الجديدة
            itemsRef.set(itemsData); // ← هون السحر: يحدث الكل فوراً!
        }
        
        // باقي الدوال: attachEventListeners, فلترة, debounce...
        // window.load = initItems;
    </script>
</body>
</html>
