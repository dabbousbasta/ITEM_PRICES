<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث الأصناف - دبوس البسطة</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            padding: 10px; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            padding: 15px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            margin-bottom: 10px; 
        }
        #logo { 
            height: 50px; 
            width: auto; 
            max-width: 150px; 
        }
        #logo:not([src]) { display: none; }
        #search { 
            width: 70%; padding: 12px 20px; border: 2px solid #e0e0e0; 
            border-radius: 25px; font-size: 16px; outline: none; transition: all 0.3s; 
        }
        #search:focus { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.3); }
        #status { 
            text-align: center; margin: 10px 0; font-weight: bold; padding: 15px; 
            border-radius: 10px; margin-bottom: 10px; 
        }
        table { 
            width: 100%; background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); border-collapse: collapse; 
            margin-top: 0 !important; 
        }
        th.name-col, td.name-col { 
            width: 66.66%;  /* ثلثين للصنف */
        }
        th.price-col, td.price-col { 
            width: 33.33%;  /* ثلث للسعر */
            font-weight: bold;
            color: #2e7d32;
        }
        th, td { padding: 15px 12px; text-align: right; font-size: 15px; }
        th { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; font-weight: bold; }
        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #e8f5e8; }
        .no-results { text-align: center; padding: 40px; color: #999; font-size: 18px; }
        .error-status { 
            background: #f8d7da !important; color: #721c24 !important; 
            border: 1px solid #f5c6cb; padding: 15px; border-radius: 10px; 
            text-align: center; font-weight: bold; margin-bottom: 10px; 
        }
        .loading-status { 
            background: #fff3cd !important; color: #856404 !important; 
            padding: 15px; border-radius: 10px; text-align: center; 
        }
        @media (max-width: 768px) { 
            .header { flex-direction: column; gap: 15px; text-align: center; } 
            #search { width: 100%; }
            #logo { max-width: 120px; }
            th.name-col, td.name-col { width: 60%; }
            th.price-col, td.price-col { width: 40%; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img id="logo" src="logo.png" alt="دبوس البسطة" 
             onerror="this.onerror=null; this.src='LOGO.PNG'; 
                      setTimeout(() => { if(this.naturalWidth === 0) this.style.display='none'; }, 100);">
        <input type="text" id="search" placeholder="اكتب جزء من اسم الصنف..." oninput="filterItems()">
    </div>
    
    <div id="status" class="loading-status">⏳ جاري تحميل الاصناف.xlsx...</div>
    
    <table id="table" style="display:none;">
        <thead>
            <tr>
                <th class="name-col">اسم الصنف</th>
                <th class="price-col">سعر المبيع</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        let items = [];
        let statusEl = null;

        function parsePrice(rawPrice) {
            if (!rawPrice) return 0;
            const clean = rawPrice.toString().replace(/[^\d.,]/g, '').replace(',', '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        }

        function formatPrice(num) {
            return new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(num) + ' $';
        }

        function updateStatus(msg, type = 'success') {
            statusEl.textContent = msg;
            statusEl.className = type + '-status';
        }

        function loadItems(filename = 'الاصناف.xlsx') {
            statusEl = document.getElementById('status');
            statusEl.textContent = `⏳ جاري تحميل ${filename}...`;
            statusEl.className = 'loading-status';
            
            const oReq = new XMLHttpRequest();
            oReq.open('GET', filename, true);
            oReq.responseType = 'arraybuffer';
            
            oReq.onload = function(e) {
                if (oReq.status !== 200) {
                    updateStatus(`❌ الملف ${filename} غير موجود. ضعه في المجلد الرئيسي`, 'error');
                    return;
                }
                
                try {
                    const data = new Uint8Array(oReq.response);
                    let bstr = '';
                    for(let i = 0; i < data.length; i++) bstr += String.fromCharCode(data[i]);
                    
                    const workbook = XLSX.read(bstr, { type: 'binary' });
                    
                    if (!workbook.SheetNames.includes('الاصناف')) {
                        updateStatus(`❌ لا توجد ورقة "الاصناف". المتوفرة: ${workbook.SheetNames.join(', ')}`, 'error');
                        return;
                    }
                    
                    const sheet = workbook.Sheets['الاصناف'];
                    const json = XLSX.utils.sheet_to_json(sheet, { 
                        defval: '', raw: false, header: 1, blankrows: false 
                    });
                    
                    items = json.slice(1).map((row) => {
                        const name = (row[4] || '').toString().trim();
                        const rawPrice = row[6];
                        const price = parsePrice(rawPrice);
                        return { name, price };
                    }).filter(item => item.name && item.price > 0);
                    
                    localStorage.setItem('itemsData', JSON.stringify(items));
                    updateStatus('');
                    document.getElementById('table').style.display = 'table';
                    renderTable(items);
                    
                } catch (error) {
                    console.error('خطأ:', error);
                    updateStatus(`❌ خطأ في القراءة: ${error.message}`, 'error');
                }
            };
            
            oReq.onerror = function() {
                updateStatus('❌ فشل تحميل الاصناف.xlsx', 'error');
            };
            
            oReq.send();
        }

        function renderTable(data) {
            const tbody = document.getElementById('tbody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="no-results">لا توجد أصناف مطابقة</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => 
                `<tr>
                    <td class="name-col">${item.name}</td>
                    <td class="price-col">${formatPrice(item.price)}</td>
                </tr>`
            ).join('');
        }

        function filterItems() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const filtered = query ? 
                items.filter(item => {
                    const words = query.split(/\s+/).filter(w => w);
                    return words.every(word => item.name.toLowerCase().includes(word));
                }) : items;
            renderTable(filtered);
        }

        window.addEventListener('load', () => {
            loadItems();
        });
    </script>
</body>
</html>
