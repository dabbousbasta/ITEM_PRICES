<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار المبيعات - دبوس البسطة</title>
    <!-- SheetJS الرسمي اللي يشتغل 100% -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>/* نفس الـ CSS السابقة تماماً */</style>
</head>
<body>
    <!-- نفس الـ HTML السابق تماماً -->
    <div class="header">
        <h1>🔍 أسعار المبيعات - دبوس البسطة</h1>
        <p>اكتب اسم الصنف (كلمات مفصولة بفراغ) للفلترة السريعة</p>
    </div>
    
    <div id="status" class="status loading">جاري تحميل الأصناف...</div>
    
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن الصنف... مثال: قسط تركي 25 اخضر" />
    
    <div class="table-container">
        <table id="itemsTable">
            <thead><tr><th>اسم الصنف</th><th>سعر المبيع</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let itemsData = [];
        
        async function loadItems() {
            try {
                const status = document.getElementById('status');
                status.textContent = 'جاري تحميل الأصناف من ITEMS.xlsx...';
                
                // raw GitHub مع mode: 'no-cors' لتجنب CORS [web:39][web:42]
                const response = await fetch('https://raw.githubusercontent.com/dabbousbasta/ITEM_PRICES/main/ITEMS.xlsx', { mode: 'cors' });
                if (!response.ok) throw new Error(`HTTP ${response.status}: تأكد من رفع ITEMS.xlsx`);
                
                const arrayBuffer = await response.arrayBuffer();
                if (typeof XLSX === 'undefined') throw new Error('SheetJS لم يحمل - أعد تحميل الصفحة');
                
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                itemsData = [];
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    const itemName = row[4] ? row[4].toString().trim() : '';
                    if (itemName) {
                        itemsData.push({ name: itemName, price: '' });
                    }
                }
                
                // LocalStorage
                const saved = localStorage.getItem('itemPrices');
                if (saved) {
                    const savedItems = JSON.parse(saved);
                    itemsData.forEach((item, idx) => {
                        const match = savedItems.find(s => s.name === item.name);
                        if (match) itemsData[idx].price = match.price;
                    });
                }
                
                renderTable(itemsData);
                status.textContent = `✅ ${itemsData.length} صنف جاهز!`;
                status.className = 'status saved';
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML = `❌ خطأ: ${error.message}<br><a href="https://github.com/dabbousbasta/ITEM_PRICES" target="_blank">ارفع ITEMS.xlsx هنا</a>`;
            }
        }
        
        // باقي الدوال نفسها تماماً: renderTable, attachEventListeners, saveData, فلترة
        function renderTable(data) { /* نفس الكود السابق */ }
        function attachEventListeners() { /* نفس */ }
        function saveData() { /* نفس */ }
        
        document.getElementById('searchInput').addEventListener('input', function() { /* نفس فلترة AND */ });
        
        // تحميل بعد SheetJS
        window.addEventListener('load', () => {
            if (typeof XLSX !== 'undefined') loadItems();
            else setTimeout(() => loadItems(), 1000);
        });
    </script>
</body>
</html>
