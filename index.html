<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث الأصناف - دبوس البسطة</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            padding: 10px; 
            line-height: 1.6; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            padding: 15px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        #logo { 
            height: 50px; 
            width: auto; 
        }
        #logo:not([src]) { display: none; }
        #search { 
            width: 70%; 
            padding: 12px 20px; 
            border: 2px solid #e0e0e0; 
            border-radius: 25px; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease; 
        }
        #search:focus { 
            border-color: #4CAF50; 
            box-shadow: 0 0 10px rgba(76,175,80,0.3); 
        }
        #status { 
            text-align: center; 
            margin: 10px 0; 
            font-weight: bold; 
            color: #666; 
            padding: 10px; 
            background: white; 
            border-radius: 10px; 
        }
        table { 
            width: 100%; 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
            border-collapse: collapse; 
            display: block; 
            overflow-x: auto; 
            white-space: nowrap; 
        }
        th, td { 
            padding: 15px 12px; 
            text-align: right; 
            font-size: 15px; 
            min-width: 150px; 
        }
        th { 
            background: linear-gradient(135deg, #4CAF50, #45a049); 
            color: white; 
            font-weight: bold; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #e8f5e8; transform: scale(1.01); transition: 0.2s; }
        @media (max-width: 768px) { 
            .header { flex-direction: column; gap: 15px; text-align: center; }
            #search { width: 100%; }
            th, td { padding: 12px 8px; font-size: 14px; min-width: 120px; }
        }
        .no-results { 
            text-align: center; 
            padding: 40px; 
            color: #999; 
            font-size: 18px; 
        }
        .error { color: #f44336 !important; }
        .success { color: #4CAF50 !important; }
    </style>
</head>
<body>
    <div class="header">
        <img id="logo" src="LOGO.PNG" alt="دبوس البسطة" onerror="console.log('Logo not found'); this.src=''; this.alt='';">
        <input type="text" id="search" placeholder="اكتب جزء من اسم الصنف... (أي ترتيب أو كلمات متعددة)" oninput="filterItems()">
    </div>
    <div id="status">جاري تحميل ITEMS.xlsx...</div>
    <table id="table">
        <thead>
            <tr>
                <th>اسم الصنف</th>
                <th>سعر المبيع</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        let items = [];
        let originalItems = [];

        async function loadItems() {
            const status = document.getElementById('status');
            status.textContent = 'جاري تحميل ITEMS.xlsx...';
            status.className = '';
            
            try {
                // جرب ITEMS.xlsx أولاً، ثم ITEMS
                let response = await fetch('ITEMS.xlsx');
                let data;
                if (!response.ok) {
                    console.log('ITEMS.xlsx not found, trying ITEMS');
                    response = await fetch('ITEMS');
                    if (!response.ok) throw new Error('الملف ITEMS.xlsx أو ITEMS غير موجود في المجلد الرئيسي');
                    data = await response.arrayBuffer();
                } else {
                    data = await response.arrayBuffer();
                }
                
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const sheetNames = workbook.SheetNames;
                console.log('Sheets:', sheetNames);
                
                if (!sheetNames.includes('ITEMS')) {
                    throw new Error(`الورقة ITEMS غير موجودة. الورقات المتوفرة: ${sheetNames.join(', ')}`);
                }
                
                const sheet = workbook.Sheets['ITEMS'];
                const json = XLSX.utils.sheet_to_json(sheet, { 
                    defval: '', 
                    raw: false, 
                    header: 1,
                    blankrows: false 
                });
                
                console.log('Raw data rows:', json.length);
                console.log('First row (headers):', json[0]);
                if (json.length > 1) console.log('Sample data:', json[1].slice(0,10));
                
                // ابدأ من الصف 2 (index 1)، عمود E=4, G=6
                originalItems = json.slice(1).map((row, idx) => {
                    const name = (row[4] || '').toString().trim();
                    const price = (row[6] || '').toString().trim();
                    if (name) console.log(`Row ${idx+2}: Name="${name}", Price="${price}"`);
                    return {
                        name: name,
                        price: parseFloat(price) || 0
                    };
                }).filter(item => item.name);
                
                items = [...originalItems];
                
                status.textContent = `✅ ${items.length} صنف محمل بنجاح!`;
                status.className = 'success';
                renderTable(items);
                
            } catch (error) {
                console.error('Load error:', error);
                status.innerHTML = `❌ خطأ: ${error.message}<br>تأكد من وجود <strong>ITEMS.xlsx</strong> أو <strong>ITEMS</strong> في نفس المجلد`;
                status.className = 'error';
                document.getElementById('table').style.display = 'none';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tbody');
            const status = document.getElementById('status');
            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="no-results">لا توجد أصناف مطابقة</td></tr>';
                status.textContent = 'لا توجد نتائج';
                return;
            }
            status.textContent = `${data.length} صنف`;
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.name || ''}</td>
                    <td>${item.price ? item.price.toLocaleString('ar-LB') + ' ل.ل' : 'غير محدد'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterItems() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            if (!query) {
                renderTable(originalItems);
                return;
            }
            const words = query.split(/\s+/).filter(w => w.length > 0);
            const filtered = originalItems.filter(item => 
                words.every(word => 
                    item.name.toLowerCase().includes(word)
                )
            );
            renderTable(filtered);
        }

        // تحميل عند فتح الصفحة
        window.addEventListener('load', () => {
            console.log('Page loaded, starting...');
            setTimeout(loadItems, 500);  // تأخير بسيط للشبكة
        });
    </script>
</body>
</html>
