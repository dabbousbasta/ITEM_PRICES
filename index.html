<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث الأصناف - دبوس البسطة</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            padding: 10px; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            padding: 15px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        #logo { height: 50px; width: auto; }
        #search { 
            width: 70%; padding: 12px 20px; border: 2px solid #e0e0e0; 
            border-radius: 25px; font-size: 16px; outline: none; transition: all 0.3s; 
        }
        #search:focus { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.3); }
        #status { 
            text-align: center; margin: 10px 0; font-weight: bold; padding: 15px; 
            border-radius: 10px; margin-bottom: 20px; 
        }
        table { 
            width: 100%; background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); border-collapse: collapse; 
        }
        th, td { padding: 15px 12px; text-align: right; font-size: 15px; }
        th { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; font-weight: bold; }
        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #e8f5e8; }
        .no-results { text-align: center; padding: 40px; color: #999; font-size: 18px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @media (max-width: 768px) { 
            .header { flex-direction: column; gap: 15px; } 
            #search { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img id="logo" src="LOGO.PNG" alt="دبوس البسطة" onerror="this.style.display='none';">
        <input type="text" id="search" placeholder="اكتب جزء من اسم الصنف..." oninput="filterItems()">
    </div>
    
    <div id="status" class="loading">⏳ جاري تحميل الاصناف.xlsx تلقائياً...</div>
    
    <table id="table" style="display:none;">
        <thead>
            <tr>
                <th>اسم الصنف</th>
                <th>سعر المبيع</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        let items = [];

        function parsePrice(rawPrice) {
            if (!rawPrice) return 0;
            const clean = rawPrice.toString().replace(/[^\d.,]/g, '').replace(',', '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        }

        function formatPrice(num) {
            return new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(num) + ' $';
        }

        function loadItems(filename = 'الاصناف.xlsx') {
            const status = document.getElementById('status');
            status.textContent = `⏳ جاري تحميل ${filename}...`;
            status.className = 'loading';
            
            const oReq = new XMLHttpRequest();
            oReq.open('GET', filename, true);
            oReq.responseType = 'arraybuffer';
            
            oReq.onload = function(e) {
                if (oReq.status !== 200) {
                    throw new Error(`الملف ${filename} غير موجود (Status: ${oReq.status}). ضعه في المجلد الرئيسي`);
                }
                
                try {
                    const data = new Uint8Array(oReq.response);
                    let bstr = '';
                    for(let i = 0; i < data.length; i++) bstr += String.fromCharCode(data[i]);
                    
                    const workbook = XLSX.read(bstr, { type: 'binary' });
                    console.log('الورقات:', workbook.SheetNames);
                    
                    if (!workbook.SheetNames.includes('الاصناف')) {
                        throw new Error(`لا توجد ورقة "الاصناف". المتوفرة: ${workbook.SheetNames.join(', ')}`);
                    }
                    
                    const sheet = workbook.Sheets['الاصناف'];
                    const json = XLSX.utils.sheet_to_json(sheet, { 
                        defval: '', raw: false, header: 1, blankrows: false 
                    });
                    
                    console.log('Raw headers:', json[0]?.slice(0, 10));
                    console.log('Sample row 2:', json[1]?.slice(0, 10));
                    
                    items = json.slice(1).map((row, idx) => {
                        const name = (row[4] || '').toString().trim();  // E: Item_name (العمود 5)
                        const rawPrice = row[6];  // G: Sale1 (العمود 7)
                        const price = parsePrice(rawPrice);
                        
                        if (idx < 5 && name) {
                            console.log(`الصف ${idx+2}: اسم="${name}", السعر الخام="${rawPrice}" (${typeof rawPrice}), السعر=${price}`);
                        }
                        
                        return { name, price };
                    }).filter(item => item.name && item.price > 0);
                    
                    console.log(`✅ تم تحميل ${items.length} صنف بسعر صحيح`);
                    localStorage.setItem('itemsData', JSON.stringify(items));
                    
                    status.textContent = `✅ ${items.length} صنف محمل من "الاصناف"!`;
                    status.className = 'success';
                    document.getElementById('table').style.display = 'table';
                    renderTable(items);
                    
                } catch (error) {
                    console.error('خطأ في القراءة:', error);
                    status.innerHTML = `❌ خطأ: ${error.message}<br>تأكد من وجود <strong>الاصناف.xlsx</strong> وورقة <strong>الاصناف</strong>`;
                    status.className = 'error';
                }
            };
            
            oReq.onerror = function() {
                status.innerHTML = `❌ فشل تحميل الاصناف.xlsx. ضعه في <strong>المجلد الرئيسي</strong>`;
                status.className = 'error';
            };
            
            oReq.send();
        }

        function renderTable(data) {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = data.length ? 
                data.map(item => 
                    `<tr>
                        <td>${item.name}</td>
                        <td>${formatPrice(item.price)}</td>
                    </tr>`
                ).join('') : 
                '<tr><td colspan="2" class="no-results">لا توجد أصناف بسعر صحيح</td></tr>';
        }

        function filterItems() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const filtered = query ? 
                items.filter(item => {
                    const words = query.split(/\s+/).filter(w => w);
                    return words.every(word => item.name.toLowerCase().includes(word));
                }) : items;
            renderTable(filtered);
            document.getElementById('status').textContent = `${filtered.length} صنف`;
        }

        window.addEventListener('load', () => {
            console.log('تحميل الاصناف.xlsx تلقائي...');
            loadItems();
        });
    </script>
</body>
</html>
